def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def safeExtGet(prop, fallback) {
  return rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  namespace "org.birkir.carplay"
  compileSdkVersion safeExtGet("compileSdkVersion", 34)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 23)
    targetSdkVersion safeExtGet("targetSdkVersion", 34)
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  def javaVersion = rootProject.ext.has("jvmTargetVersion")
    ? JavaVersion.toVersion(rootProject.ext.get("jvmTargetVersion"))
    : JavaVersion.VERSION_17

  compileOptions {
    sourceCompatibility javaVersion
    targetCompatibility javaVersion
  }

  kotlinOptions {
    jvmTarget = javaVersion.toString()
  }

  sourceSets {
    main {
      manifest.srcFile "src/main/AndroidManifestNew.xml"
      java.srcDirs = ["src/main/java"]
      res.srcDirs = ["src/main/res"]
    }
  }
}

dependencies {
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-android:+"
  implementation "androidx.car.app:app-projected:1.4.0-beta02"
  implementation "androidx.car.app:app:1.4.0-beta02"
  implementation "org.greenrobot:eventbus:3.2.0"
}
